services:
  - type: web
    name: gestion-sushi
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sushi-db
          property: connectionString

databases:
  - name: sushi-db
    plan: free
    databaseName: sushi
    user: sushi
