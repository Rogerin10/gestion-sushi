<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍣 Admin - Sushi Roll</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="admin">

    <!-- LOGIN -->
    <div id="loginPanel" class="login-container">
        <div class="login-box">
            <h1>🔐 Acceso Administración</h1>
            <form id="loginForm">
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
                <p id="loginError" class="login-error" style="display:none;">Contraseña incorrecta</p>
            </form>
            <a href="index.html" class="btn-volver-login">← Volver al Catálogo</a>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" style="display:none;">

        <header class="header-admin">
            <h1>⚙️ Administración de Productos</h1>
            <div class="header-admin-actions">
                <a href="index.html" class="btn-volver">🛒 Ver Catálogo</a>
                <button onclick="cerrarSesion()" class="btn-cerrar">🚪 Salir</button>
            </div>
        </header>

        <section class="dashboard">
            <div class="stat-card">
                <h3>🍱 Productos</h3>
                <span id="totalProductos">0</span>
            </div>
        </section>

        <main class="admin-main-simple">

            <section class="panel panel-form">
                <h2 id="formTitle">➕ Agregar Producto</h2>
                <form id="formProducto" enctype="multipart/form-data">
                    <input type="text" id="nombre" placeholder="Nombre del producto" required>
                    <select id="tipo" required>
                        <option value="">Seleccione tipo</option>
                        <option value="Hand Roll">Hand Roll</option>
                        <option value="Sushi">Sushi</option>
                    </select>
                    <textarea id="descripcion" placeholder="Ingredientes / Descripción" rows="4"></textarea>
                    
                    <!-- Opciones de imagen: Subir archivo O URL -->
                    <div class="imagen-opciones">
                        <label class="imagen-label">Imagen del producto:</label>
                        <div class="imagen-tabs">
                            <button type="button" class="tab-btn active" onclick="cambiarTabImagen('archivo')">📁 Subir archivo</button>
                            <button type="button" class="tab-btn" onclick="cambiarTabImagen('url')">🔗 URL externa</button>
                        </div>
                        <div id="tabArchivo" class="tab-content">
                            <input type="file" id="imagenArchivo" accept="image/*">
                            <small>Máximo 5MB (jpg, png, gif, webp)</small>
                        </div>
                        <div id="tabUrl" class="tab-content" style="display:none;">
                            <input type="url" id="imagen" placeholder="https://ejemplo.com/imagen.jpg">
                        </div>
                    </div>

                    <input type="number" id="precio" placeholder="Precio (CLP)" required>
                    <button type="submit">🍣 Guardar Producto</button>
                    <button type="button" id="btnCancelar" style="display:none;" onclick="cancelarEdicion()">Cancelar</button>
                </form>
            </section>

            <section class="panel">
                <h2>📋 Productos Existentes</h2>
                <div id="productos"></div>
            </section>

        </main>

    </div>

    <script>
        const ADMIN_PASSWORD = '1234';

        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('adminAuth')) {
                mostrarAdmin();
            }

            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('loginPassword').value;

                if (password === ADMIN_PASSWORD) {
                    sessionStorage.setItem('adminAuth', 'true');
                    mostrarAdmin();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            });
        });

        function mostrarAdmin() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            cargarProductos();
        }

        function cerrarSesion() {
            sessionStorage.removeItem('adminAuth');
            location.reload();
        }
    </script>

    <script src="script-admin.js"></script>

</body>

</html>
